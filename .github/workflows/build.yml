name: Build & Publish

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  ARCHITECTURES: '["amd64"]'
  IMAGE_NAME: dokuwiki

jobs:
  init:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ghcr.io/${{ steps.lower.outputs.owner }}

  build:
    name: Build ${{ matrix.arch }}
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image (test only)
        if: github.event_name != 'release'
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          image-tags: test
          version: test
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: dokuwiki
          push: "false"
          cosign: "false"
          build-args: BUILD_FROM=ghcr.io/hassio-addons/base:20.0.1

      - name: Login to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        if: github.event_name == 'release'
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ github.event.release.tag_name }}
            latest
          version: ${{ github.event.release.tag_name }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: dokuwiki
          push: "true"
          cosign: "true"
          build-args: BUILD_FROM=ghcr.io/hassio-addons/base:20.0.1

