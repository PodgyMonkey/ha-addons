name: DokuWiki
description: >-
  A simple, self-contained wiki engine that stores data in plain text files.
  No database required
version: "1.1.6"
slug: dokuwiki
image: ghcr.io/podgymonkey/amd64-dokuwiki
url: https://github.com/PodgyMonkey/ha-addons#readme
arch:
  - amd64
init: false
watchdog: "http://[HOST]:8080/"
webui: "http://[HOST]:[PORT:8080]"
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: DokuWiki HTTP
panel_icon: mdi:notebook
panel_title: DokuWiki
map:
  - share:rw
options:
  log_level: info
  php_upload_limit: 16M
  php_memory_limit: 256M
  php_timezone: UTC
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  php_upload_limit: str
  php_memory_limit: str
  php_timezone: str
