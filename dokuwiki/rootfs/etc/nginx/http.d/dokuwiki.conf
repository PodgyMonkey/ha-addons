log_format dokuwiki '[$time_iso8601] $remote_addr "$request" $status $body_bytes_sent';

server {
    listen 8080;
    listen [::]:8080;

    root /var/www/dokuwiki;
    index doku.php index.php;

    access_log /dev/stdout dokuwiki;
    error_log  /dev/stderr warn;

    # First-run handler: active while install.php exists, removed on restart after setup
    location = / {
        if (-f $document_root/install.php) {
            rewrite ^ /dokuwiki-first-run.php last;
        }
        try_files $uri $uri/ @dokuwiki;
    }

    # DokuWiki URL rewrites
    location / {
        try_files $uri $uri/ @dokuwiki;
    }

    location @dokuwiki {
        rewrite ^/_media/(.*) /lib/exe/fetch.php?media=$1 last;
        rewrite ^/_detail/(.*) /lib/exe/detail.php?media=$1 last;
        rewrite ^/_export/([^/]+)/(.*) /doku.php?do=export_$1&id=$2 last;
        rewrite ^/(.*) /doku.php?id=$1&$args last;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block direct web access to sensitive directories
    location ~ ^/(data|conf)/ {
        deny all;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
