[www]
listen = 127.0.0.1:9000

user = nobody
group = nobody

; Let environment variables (including SUPERVISOR_TOKEN) reach PHP
clear_env = no

; Log errors to stderr (s6/docker captures this)
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on

; Process manager
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
